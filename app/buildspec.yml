version: 0.2

phases:
  pre_build:
    commands:
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $REPO_URI

  build:
    commands:
      - docker build -t nginx-app .
      - docker tag nginx-app:latest $REPO_URI:latest

  post_build:
    commands:
      - docker push $REPO_URI:latest
